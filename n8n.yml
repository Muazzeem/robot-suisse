services:
    n8n:
        image: n8nio/n8n
        container_name: robot-suisses-n8n
        ports:
            - "5678:5678"
        environment:
            - N8N_SECURE_COOKIE=false
            - N8N_EDITOR_BASE_URL=https://n8n.fifadesk.com
            - WEBHOOK_URL=https://n8n.fifadesk.com
        volumes:
            - n8n-data:/home/node/.n8n
        restart: unless-stopped

volumes:
    n8n-data:
